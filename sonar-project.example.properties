# Project Identification
sonar.projectKey=
sonar.projectName=Todo App
sonar.projectVersion=1.0
sonar.host.url=http://localhost:9000
sonar.token=
sonar.scm.disabled=true

# Path to source and test files
sonar.sources=src
# We include src here because Vitest usually keeps tests alongside components
sonar.tests=src 

# Patterns to identify test files
sonar.test.inclusions=**/*.test.jsx,**/*.test.js,**/*.spec.jsx,**/*.spec.js

# Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/*.test.jsx,**/*.test.js
sonar.coverage.exclusions=src/main.tsx,src/vite-env.d.ts,**/*.config.ts

# Source encoding
sonar.sourceEncoding=UTF-8

# Coverage Reports (Path to the LCOV file generated by Vitest)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
# If using TypeScript, Sonar often needs this specifically:
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# (Optional) Test Execution Reports
# Use this if you want to see "15/15 tests passed" in the Sonar UI
# sonar.testExecutionReportPaths=test-report.xml